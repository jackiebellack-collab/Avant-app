<script>
function showPage(id){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});document.querySelectorAll('.nav-link').forEach(function(l){l.classList.remove('active')});document.getElementById('page-'+id).classList.add('active');var nl=document.getElementById('nl-'+id);if(nl)nl.classList.add('active');window.scrollTo(0,0)}
function showPanel(id,btn){document.querySelectorAll('.studio-panel').forEach(function(p){p.classList.remove('on')});document.querySelectorAll('.sidebar-item').forEach(function(s){s.classList.remove('on')});document.getElementById('panel-'+id).classList.add('on');if(btn)btn.classList.add('on')}
function openModal(){document.getElementById('modalOverlay').classList.add('on');document.body.style.overflow='hidden'}
function closeModal(){document.getElementById('modalOverlay').classList.remove('on');document.body.style.overflow=''}
function modalSubmit(){document.getElementById('modalForm').style.display='none';document.getElementById('modalOk').style.display='block';setTimeout(closeModal,2200)}
function editSubscribe(){var v=document.getElementById('editEmail').value;if(!v||v.indexOf('@')===-1)return;document.getElementById('editForm').style.display='none';document.getElementById('editOk').style.display='block'}
function filterCurio(cat,btn){curioFilter=cat;document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('on')});btn.classList.add('on');renderCurio()}
function deleteCurio(id){curioItems=curioItems.filter(function(i){return i.id!==id});renderCurio()}
function closeNote(){document.getElementById('noteOverlay').classList.remove('on')}
function saveNote(){var item=curioItems.find(function(i){return i.id===noteItemId});if(item)item.note=document.getElementById('noteText').value;closeNote();renderCurio()}
function openNote(id){noteItemId=id;var item=curioItems.find(function(i){return i.id===id});document.getElementById('noteItemName').textContent=item.label;document.getElementById('noteText').value=item.note||'';var imgEl=document.getElementById('noteItemImg');imgEl.innerHTML=item.img?'<img src="'+item.img+'" style="width:100%;height:100%;object-fit:cover">':item.label;document.getElementById('noteOverlay').classList.add('on')}
function removeBoard(i){boardItems.splice(i,1);renderBoard()}
function clearBoard(){boardItems.length=0;pickedSamples.clear();renderSampleMini();renderBoard()}
function addCurioToBoard(id){var item=curioItems.find(function(i){return i.id===id});if(!item)return;boardItems.push({key:'c'+id,label:item.label,img:item.img||'',price:''});renderBoard()}
function toggleSample(i){if(pickedSamples.has(i)){pickedSamples.delete(i);var idx=boardItems.findIndex(function(b){return b.key==='s'+i});if(idx>-1)boardItems.splice(idx,1)}else{pickedSamples.add(i);boardItems.push({key:'s'+i,label:samples[i].brand,img:samples[i].img||null,price:samples[i].price})}renderSampleMini();renderBoard()}
function generateFromBoard(){showPanel('content-gen',document.getElementById('si-content-gen'));var names=boardItems.map(function(b){return b.label}).join(', ');if(names)document.getElementById('genDesc').value=names}
function copyContent(){var text='';if(genCurrentTab==='caption')text=genData.caption;else if(genCurrentTab==='hashtags')text=genData.hashtags.join(' ');else text=genData.hook;navigator.clipboard.writeText(text).then(function(){var btn=event.target;btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy'},1500)})}
function switchGenTab(tab,btn){genCurrentTab=tab;document.querySelectorAll('.gen-tab').forEach(function(t){t.classList.remove('on')});if(btn)btn.classList.add('on');document.getElementById('genCaption').style.display=tab==='caption'?'block':'none';document.getElementById('genHashtagsWrap').style.display=tab==='hashtags'?'block':'none';document.getElementById('genHookWrap').style.display=tab==='hook'?'block':'none';if(tab==='caption')document.getElementById('genCaption').textContent=genData.caption;else if(tab==='hashtags')document.getElementById('genHashtagsList').innerHTML=genData.hashtags.map(function(h){return'<span class="gen-hashtag">'+h+'</span>'}).join('');else if(tab==='hook')document.getElementById('genHookText').textContent=genData.hook}
function generateContent(){var desc=document.getElementById('genDesc').value||'Minimal spring look';var tone=document.getElementById('genTone').value;var platform=document.getElementById('genPlatform').value;document.getElementById('genPlaceholder').style.display='none';document.getElementById('genResult').style.display='none';document.getElementById('genLoading').style.display='flex';setTimeout(function(){if(tone.indexOf('Editorial')>-1)genData.caption='The edit.\n\nPieces chosen for what they do, not what they say.\n\nAll linked.';else if(tone.indexOf('Warm')>-1)genData.caption='Ok but this look is everything right now.\n\nFound these pieces and could not stop thinking about them together.\n\nLinks are in bio!';else if(tone.indexOf('Direct')>-1)genData.caption='This weeks edit.\n\nEverything linked in bio. Affiliate links used - thank you for supporting the work.';else genData.caption='There is a certain kind of dressing that feels like armor. Quiet, considered, completely intentional.\n\nEvery piece linked.';var sets={'Instagram':['#quietluxury','#editorialfashion','#minimalstyle','#slowfashion','#fashionedit','#ootd','#styleinspo','#fashionblogger','#wardrobeessentials','#investmentpiece','#therow','#toteme'],'TikTok':['#quietluxury','#fashiontok','#ootd','#styletok','#fashioninspo','#minimalfashion','#outfitcheck','#fashionblogger'],'Pinterest':['#quietluxury','#minimalistfashion','#editorialstyle','#capsulewardrobe','#fashionmoodboard','#styleinspo'],'LinkedIn':['#fashionbusiness','#creatorseconomy','#fashionmarketing','#contentcreator']};genData.hashtags=(sets[platform]||sets['Instagram']).slice(0,12);genData.hook='The most considered look of the season. Every piece linked.';document.getElementById('genLoading').style.display='none';document.getElementById('genResult').style.display='block';switchGenTab(genCurrentTab,null)},1200)}
function generateHashtags(){var input=document.getElementById('htInput').value.toLowerCase().trim();var results=document.getElementById('htResults');var db={'quiet luxury':['#quietluxury','#therow','#toteme','#lemaire','#minimalistfashion','#oldmoney','#luxuryfashion','#editorialstyle','#slowfashion','#investmentpieces','#capsulewardrobe','#timelessstyle'],'streetwear':['#streetwear','#streetstyle','#hypebeast','#streetfashion','#urbanfashion','#sneakers','#drip','#outfitoftheday','#ootd','#fashion'],'coastal grandmother':['#coastalgrandmother','#coastalstyle','#summerstyle','#linen','#beachstyle','#cozyfashion','#effortlessstyle','#casualluxury'],'dark academia':['#darkacademia','#academiaesthetic','#vintagevibes','#grunge','#darkfashion','#gothicfashion'],'default':['#fashion','#style','#ootd','#fashionblogger','#styleinspo','#fashionista','#instafashion','#lookoftheday','#fashiongram','#outfitinspiration','#womensfashion','#fashionedit']};var tags=db['default'];for(var key in db){if(input.indexOf(key)>-1||key.indexOf(input)>-1){tags=db[key];break}}results.innerHTML=tags.map(function(t){return'<span class="ht-tag" onclick="copyTag(this,\''+t+'\')">'+t+'</span>'}).join('')}
function copyTag(el,tag){navigator.clipboard.writeText(tag);el.classList.add('copied');el.textContent='Copied!';setTimeout(function(){el.classList.remove('copied');el.textContent=tag},1200)}
function generateWeek(){var s=[[{platform:'Instagram',text:'The edit: spring capsule essentials'},{platform:'Pinterest',text:'Quiet luxury mood board 2026'}],[{platform:'TikTok',text:'5 pieces I wear on repeat'}],[{platform:'Instagram Stories',text:'Behind the edit - what I almost bought'}],[{platform:'Instagram',text:'Brand worth knowing this week'},{platform:'Newsletter',text:'The Avant Edit - issue 4'}],[{platform:'TikTok',text:'Outfit check: before and after the edit'}],[{platform:'Instagram',text:'Weekend edit - what I actually wore'}],[]];renderPlanner(s)}

var samples=[{brand:'Toteme',name:'Silk shirt',price:'$420',img:'https://images.unsplash.com/photo-1434389677669-e08b4cac3105?w=300&q=80'},{brand:'The Row',name:'Trousers',price:'$1,290',img:'https://images.unsplash.com/photo-1509631179647-0177331693ae?w=300&q=80'},{brand:'Lemaire',name:'Crossbody',price:'$895',img:'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=300&q=80'},{brand:'Cos',name:'Wool coat',price:'$340',img:'https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=300&q=80'},{brand:'Khaite',name:'Mules',price:'$650',img:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300&q=80'},{brand:'Auralee',name:'Knit top',price:'$380',img:'https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=300&q=80'},{brand:'Baserange',name:'Wide leg',price:'$185',img:'https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=300&q=80'},{brand:'Jacquemus',name:'Mini bag',price:'$560',img:'https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=300&q=80'}];
var boardItems=[];var pickedSamples=new Set();
var curioItems=[{id:1,url:'',img:'https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=400&q=80',label:'Zara linen dress',cat:'fashion',note:''},{id:2,url:'',img:'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=400&q=80',label:'Arhaus cloud sofa',cat:'home',note:'Perfect for the new living room'},{id:3,url:'',img:'https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=400&q=80',label:'Glossier serum',cat:'beauty',note:''},{id:4,url:'',img:'https://images.unsplash.com/photo-1533105079780-92b9be482077?w=400&q=80',label:'Amalfi Coast',cat:'travel',note:'Summer 2026 goal'},{id:5,url:'',img:'https://images.unsplash.com/photo-1509631179647-0177331693ae?w=400&q=80',label:'Wide leg trousers',cat:'fashion',note:''},{id:6,url:'',img:'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400&q=80',label:'Leather tote',cat:'fashion',note:''},{id:7,url:'',img:'https://images.unsplash.com/photo-1449247709967-d4461a6a6103?w=400&q=80',label:'Marble side table',cat:'home',note:''},{id:8,url:'',img:'https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=400&q=80',label:'Skincare routine',cat:'beauty',note:''}];
var curioFilter='all';var noteItemId=null;var genCurrentTab='caption';var genData={caption:'',hashtags:[],hook:''};var heroCount=2;

function renderBoard(){var grid=document.getElementById('boardGrid');var stats=document.getElementById('boardStats');if(!grid)return;var cells=[];boardItems.forEach(function(item,i){cells.push('<div class="board-cell">'+(item.img?'<img src="'+item.img+'" onerror="this.style.display=\'none\'">':'')+'<div class="board-cell-label"><span>'+item.label+'</span></div><button class="board-cell-remove" onclick="removeBoard('+i+')">x</button></div>')});while(cells.length<6)cells.push('<div class="board-cell board-add-cell" onclick="document.getElementById(\'importUrl\').focus()"><div class="board-add-icon">+</div><div class="board-add-text">Add item</div></div>');grid.innerHTML=cells.join('');var total=boardItems.reduce(function(s,item){return s+(item.price?parseInt(item.price.replace(/[^0-9]/g,'')):0)},0);if(stats)stats.textContent=boardItems.length+' items  $'+total.toLocaleString()+' total'}
function renderSampleMini(){var grid=document.getElementById('sampleMini');if(!grid)return;grid.innerHTML=samples.map(function(s,i){return'<div class="sample-card '+(pickedSamples.has(i)?'picked':'')+'" onclick="toggleSample('+i+')">'+(s.img?'<div class="sample-img"><img src="'+s.img+'" onerror="this.parentElement.innerHTML=\'<span>'+s.brand+'</span>\'"></div>':'<div class="sample-img"><span>'+s.brand+'<br>'+s.name+'</span></div>')+'<div class="sample-info"><div class="sample-brand">'+s.brand+'</div><div class="sample-name">'+s.name+'</div><div class="sample-price">'+s.price+'</div></div></div>'}).join('');renderCurioFeedMini()}
function renderCurioFeedMini(){var grid=document.getElementById('curioFeedMini');if(!grid)return;if(curioItems.length===0){grid.innerHTML='<div style="font-size:11px;color:var(--g300);font-style:italic;padding:8px 0">Save items in Curio to see them here.</div>';return}grid.innerHTML=curioItems.slice(0,6).map(function(item){return'<div class="sample-card" onclick="addCurioToBoard('+item.id+')">'+(item.img?'<div class="sample-img"><img src="'+item.img+'" onerror="this.parentElement.innerHTML=\'<span>'+item.label+'</span>\'"></div>':'<div class="sample-img"><span>'+item.label+'</span></div>')+'<div class="sample-info"><div class="sample-brand">'+item.cat+'</div><div class="sample-name">'+item.label+'</div></div></div>'}).join('')}
function renderCurio(){var grid=document.getElementById('curioGrid');if(!grid)return;var filtered=curioFilter==='all'?curioItems:curioItems.filter(function(i){return i.cat===curioFilter});if(filtered.length===0){grid.innerHTML='<div class="curio-empty"><p>Nothing saved yet.</p><span>Paste a URL above to save your first item.</span></div>';return}grid.innerHTML=filtered.map(function(item){return'<div class="curio-item" onclick="openNote('+item.id+')">'+'<div class="curio-img">'+(item.img?'<img src="'+item.img+'" onerror="this.style.display=\'none\'">':'<div class="curio-img-placeholder">'+item.label+'</div>')+'<button class="curio-item-del" onclick="event.stopPropagation();deleteCurio('+item.id+')">x</button></div>'+'<div class="curio-item-info"><div class="curio-item-cat">'+item.cat+'</div><div class="curio-item-name">'+item.label+'</div>'+(item.note?'<div style="font-size:10px;color:var(--g500);margin-top:3px;font-style:italic">"'+item.note.substring(0,40)+(item.note.length>40?'...':'')+'"</div>':'')+'</div></div>'}).join('')}
function renderPlanner(posts){var grid=document.getElementById('plannerGrid');if(!grid)return;var days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];var dates=[14,15,16,17,18,19,20];grid.innerHTML=days.map(function(day,i){return'<div class="planner-day"><div class="planner-day-header"><div class="planner-day-name">'+day+'</div><div class="planner-day-date">Apr '+dates[i]+'</div></div><div class="planner-day-body">'+(posts[i]||[]).map(function(p){return'<div class="planner-post"><div class="planner-post-platform">'+p.platform+'</div><div class="planner-post-text">'+p.text+'</div></div>'}).join('')+'<div class="planner-add" onclick="openModal()">+ Add post</div></div></div>'}).join('')}

async function fetchPage(url){var proxies=[function(u){return'https://api.allorigins.win/get?url='+encodeURIComponent(u)},function(u){return'https://corsproxy.io/?'+encodeURIComponent(u)},function(u){return'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u)}];for(var i=0;i<proxies.length;i++){try{var r=await fetch(proxies[i](url),{signal:AbortSignal.timeout(7000)});if(!r.ok)continue;var ct=r.headers.get('content-type')||'';var text=ct.includes('json')?(await r.json()).contents||'':await r.text();if(text&&text.length>200)return text}catch(e){continue}}return null}
function parseMeta(html){var img='';var patterns=[/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i,/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i,/<meta[^>]+name=["']twitter:image["'][^>]+content=["']([^"']+)["']/i];for(var i=0;i<patterns.length;i++){var m=html.match(patterns[i]);if(m&&m[1]&&m[1].startsWith('http')){img=m[1];break}}var tm=html.match(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']+)["']/i)||html.match(/<title[^>]*>([^<]+)<\/title>/i);var title=tm?tm[1].replace(/\s*[\|\-\u2013\u2014]\s*.+$/,'').trim().substring(0,30):'Saved item';return{img:img,title:title}}
async function importItem(){var raw=document.getElementById('importUrl').value.trim();if(!raw)return;var status=document.getElementById('importStatus');status.textContent='Fetching...';if(/\.(jpg|jpeg|png|webp|gif)(\?.*)?$/i.test(raw)){boardItems.push({key:'i'+Date.now(),label:'Saved item',img:raw,price:''});document.getElementById('importUrl').value='';status.textContent='Added!';renderBoard();return}var html=await fetchPage(raw);if(html){var meta=parseMeta(html);if(meta.img){boardItems.push({key:'i'+Date.now(),label:meta.title,img:meta.img,price:''});document.getElementById('importUrl').value='';status.textContent='Added: '+meta.title}else{status.textContent='No image found. Right-click product photo, Copy image address, paste here.'}}else{status.textContent='Site blocked. Right-click product image, Copy image address, paste here.'}renderBoard()}
async function curioSave(){var raw=document.getElementById('curioUrl').value.trim();if(!raw)return;var status=document.getElementById('curioStatus');var btn=document.querySelector('#page-curio .save-btn');if(btn)btn.disabled=true;var cats={fashion:['ssense','net-a-porter','zara','asos','revolve','shopbop','farfetch','cos','hm','uniqlo','mango'],home:['arhaus','wayfair','cb2','westelm','crateandbarrel','potterybarn','ikea','restoration'],beauty:['glossier','sephora','ulta','space-nk','kiehls'],travel:['airbnb','booking','tripadvisor','hotels','expedia']};var detectedCat='fashion';for(var cat in cats){if(cats[cat].some(function(d){return raw.toLowerCase().indexOf(d)>-1})){detectedCat=cat;break}}if(/\.(jpg|jpeg|png|webp|gif)(\?.*)?$/i.test(raw)){curioItems.unshift({id:Date.now(),url:raw,img:raw,label:'Saved item',cat:detectedCat,note:''});document.getElementById('curioUrl').value='';status.textContent='Saved!';renderCurio();if(btn)btn.disabled=false;return}status.textContent='Saving...';var html=await fetchPage(raw);if(html){var meta=parseMeta(html);curioItems.unshift({id:Date.now(),url:raw,img:meta.img||'',label:meta.title,cat:detectedCat,note:''});status.textContent=meta.img?'Saved: '+meta.title:'Saved: '+meta.title+' - right-click image for photo';document.getElementById('curioUrl').value=''}else{status.textContent='Site blocked. Right-click product image, Copy image address, paste here.'}renderCurio();if(btn)btn.disabled=false}
async function heroSave(){var raw=document.getElementById('heroUrl').value;if(raw)raw=raw.trim();if(!raw)return;var status=document.getElementById('heroStatus');status.textContent='Saving...';var html=await fetchPage(raw);var label='Saved item';var img='';if(html){var m=parseMeta(html);label=m.title;img=m.img}heroCount++;if(document.getElementById('heroCount'))document.getElementById('heroCount').textContent=heroCount+' items saved';if(document.getElementById('heroUrl'))document.getElementById('heroUrl').value='';status.textContent=img?'Saved: '+label:'Saved! Paste image URL for the photo.'}

var defaultPosts=[[{platform:'Instagram',text:'Quiet luxury edit - spring capsule'},{platform:'Pinterest',text:'Mood board: neutral tones'}],[],[{platform:'TikTok',text:'Outfit check - 3 ways to wear a silk shirt'}],[{platform:'Instagram',text:'Creator worth watching this week'}],[],[{platform:'Instagram',text:'Shop the edit - weekend picks'}],[]];

renderBoard();
renderSampleMini();
renderCurio();
renderPlanner(defaultPosts);
document.getElementById('nl-home').classList.add('active');
</script>
</body>
